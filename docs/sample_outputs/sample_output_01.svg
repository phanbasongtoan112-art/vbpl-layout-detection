  <text x="255" y="125" font-family="Arial, sans-serif" font-size="34" fill="#111827">LUẬT HOẠT ĐỘNG GIÁM SÁT</text>
  <text x="255" y="228" font-family="Arial, sans-serif" font-size="24" fill="#111827">Điều 1. Phạm vi điều chỉnh</text>
  <text x="255" y="308" font-family="Arial, sans-serif" font-size="19" fill="#374151">Văn bản này quy định phạm vi, đối tượng, nguyên tắc và nội dung giám sát.</text>
  <text x="255" y="340" font-family="Arial, sans-serif" font-size="19" fill="#374151">Các đoạn văn được đánh dấu làm dữ liệu paragraph cho mô hình layout.</text>
