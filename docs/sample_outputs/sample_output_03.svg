  <text x="248" y="130" font-family="Arial, sans-serif" font-size="28" fill="#111827">THÔNG TƯ HƯỚNG DẪN THI HÀNH</text>
  <text x="248" y="235" font-family="Arial, sans-serif" font-size="24" fill="#111827">Mục 1. Nội dung chính</text>
  <text x="248" y="325" font-family="Arial, sans-serif" font-size="18" fill="#374151">Phần này minh họa một tài liệu có nhiều đoạn văn bản liên tiếp, một danh sách</text>
  <text x="248" y="355" font-family="Arial, sans-serif" font-size="18" fill="#374151">các đầu mục và một bảng nhỏ ở cuối trang. Khi chạy thật, script sẽ sinh box</text>
  <text x="248" y="385" font-family="Arial, sans-serif" font-size="18" fill="#374151">trực tiếp từ tọa độ DOM được Selenium trả về.</text>
  <text x="260" y="577" font-family="Arial, sans-serif" font-size="19" fill="#111827">• Phạm vi quản lý</text>
  <text x="260" y="609" font-family="Arial, sans-serif" font-size="19" fill="#111827">• Đối tượng áp dụng</text>
  <text x="260" y="641" font-family="Arial, sans-serif" font-size="19" fill="#111827">• Trách nhiệm thực hiện</text>
